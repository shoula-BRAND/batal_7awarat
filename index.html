<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVEN POP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --accent-color: #ff3b30;
        }
        [data-theme="dark"] {
            --bg-color: #0c0c0c;
            --text-color: #ffffff;
            --card-bg: #161616;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        [data-theme="dark"] header {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -1px;
        }
        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            position: relative;
        }
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-color);
            color: white;
            font-size: 11px;
            font-weight: 900;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grid-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 5%;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s;
        }
        .product-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .product-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .product-card:hover {
            box-shadow: 0 10px 30px rgba(255,255,255,0.02);
        }
        .product-img {
            width: 100%;
            height: 380px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sale-tag {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--accent-color);
            color: white;
            font-weight: 900;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 2;
        }
        .wishlist-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #ccc;
            font-size: 18px;
            z-index: 2;
            transition: transform 0.2s, color 0.2s;
        }
        .wishlist-btn.active {
            color: var(--accent-color);
        }
        .wishlist-btn:hover {
            transform: scale(1.1);
        }
        .old-price {
            text-decoration: line-through;
            color: #888;
            font-size: 14px;
            margin-right: 5px;
        }
        .new-price {
            color: var(--accent-color);
        }
        .viewer-count {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .viewer-count::before {
            content: "•";
            color: #4cd964;
            font-size: 18px;
        }
        .size-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .size-btn {
            flex: 1;
            padding: 8px;
            background: none;
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-color);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        [data-theme="dark"] .size-btn {
            border: 1px solid rgba(255,255,255,0.1);
        }
        .size-btn.selected {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }
        .add-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
        }
        .quickview-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 15px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s;
        }
        .product-img:hover .quickview-hint {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: var(--bg-color);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        body.rtl-mode .sidebar {
            right: auto;
            left: -400px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }
        .sidebar.open {
            right: 0;
        }
        body.rtl-mode .sidebar.open {
            left: 0;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .sidebar-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
        }
        .sidebar-items {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .sidebar-item-img {
            width: 70px;
            height: 90px;
            border-radius: 8px;
            background: #eee;
            object-fit: cover;
        }
        .sidebar-checkout {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .checkout-btn {
            background: #25d366;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-color);
            max-width: 800px;
            width: 100%;
            border-radius: 24px;
            padding: 30px;
            position: relative;
            display: flex;
            gap: 30px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
            z-index: 5;
        }
        .modal-left {
            flex: 1;
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            background: #eee;
        }
        .modal-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-left { height: 300px; }
            .sidebar { width: 100%; right: -100%; }
            body.rtl-mode .sidebar { left: -100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ELEVEN.</div>
        <div class="nav-right">
            <button class="nav-btn" onclick="toggleTheme()">🌓</button>
            <button class="nav-btn" onclick="toggleLang()">🌐 <span style="font-size:12px;" id="lang-indicator">AR</span></button>
            <button class="nav-btn" onclick="openSidebar('wishlist')">❤ <span class="badge" id="wishlist-count">0</span></button>
            <button class="nav-btn" onclick="openSidebar('cart')">🛍 <span class="badge" id="cart-count">0</span></button>
        </div>
    </header>

    <div class="grid-container">
        <div class="products-grid" id="products-grid"></div>
    </div>

    <!-- Sidebar Cart/Wishlist -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Shopping Bag</h2>
            <button class="sidebar-close" onclick="closeSidebar()">✕</button>
        </div>
        <div class="sidebar-items" id="sidebar-items"></div>
        <div class="sidebar-checkout" id="sidebar-checkout-section">
            <div style="display:flex; justify-content:space-between; font-weight:900; font-size:18px;">
                <span id="total-text">Total:</span>
                <span id="sidebar-total">0 EGP</span>
            </div>
            <button class="checkout-btn" onclick="checkoutWhatsApp()">
                Order via WhatsApp 💬
            </button>
        </div>
    </div>

    <!-- Quick View Modal -->
    <div class="modal" id="quickview-modal" onclick="closeQuickView()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeQuickView()">✕</button>
            <div class="modal-left">
                <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-right">
                <h2 id="modal-title" style="font-weight:900; margin-bottom:10px;">ELEVEN PIECE</h2>
                <div style="margin-bottom:15px;">
                    <span class="old-price" style="font-size:18px;">699 EGP</span>
                    <span class="new-price" style="font-size:24px; font-weight:900;">550 EGP</span>
                </div>
                <p style="color:#666; margin-bottom:20px; font-size:14px; line-height:1.6;" id="modal-desc">
                    Premium heavy-cotton oversized t-shirt from Eleven collection. Designed for ultimate street comfort.
                </p>
                <div class="size-selector" id="modal-size-group"></div>
                <button class="add-btn" id="modal-add-btn" style="padding:15px; font-size:16px;">Add to Bag</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let cart = [];
        let wishlist = [];
        let selectedSizes = {}; 
        const grid = document.getElementById('products-grid');

        const localFallbackPath = "C:/Users/CompuLap/Downloads/ELEVEN (5)/";

        const translations = {
            en: {
                piece: "PIECE",
                addToBag: "ADD TO BAG",
                viewing: "{num} people are viewing this right now",
                bagTitle: "Shopping Bag",
                wishTitle: "My Wishlist",
                total: "Total:",
                empty: "Empty",
                ordered: "I want to order:"
            },
            ar: {
                piece: "قطعة",
                addToBag: "إضافة للسلة",
                viewing: "يشاهد هذا المنتج الآن {num} أشخاص",
                bagTitle: "حقيبة التسوق",
                wishTitle: "المفضلة الخاصة بي",
                total: "الإجمالي:",
                empty: "فارغ",
                ordered: "أود طلب المنتجات التالية:"
            }
        };

        function handleImgError(imgElement, id) {
            if (!imgElement.getAttribute('data-tried-local')) {
                imgElement.setAttribute('data-tried-local', 'true');
                imgElement.src = `${localFallbackPath}${id}.png`;
            } else if (!imgElement.getAttribute('data-tried-placeholder')) {
                imgElement.setAttribute('data-tried-placeholder', 'true');
                imgElement.src = `https://placehold.co/500x700?text=Piece+${id}`;
            }
        }

        // Loop الأساسي لإنشاء المنتجات من رقم 9 حتى رقم 48 بشكل ديناميكي كامل دون كسر الـ CSS
        for (let i = 9; i <= 48; i++) {
            const randomViewers = Math.floor(Math.random() * 15) + 8;
            const isFav = wishlist.includes(i) ? 'active' : '';
            const viewerText = translations[currentLang].viewing.replace("{num}", randomViewers);

            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-id', i);
            
            card.innerHTML = `
                <div class="sale-tag">SALE</div>
                <button class="wishlist-btn ${isFav}" onclick="event.stopPropagation(); toggleWishlist(${i}, this)">❤</button>
                <div class="product-img" onclick="openQuickView(${i})">
                    <img src="images/${i}.png" alt="Eleven Piece" onerror="handleImgError(this, ${i})">
                    <div class="quickview-hint">QUICK VIEW</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:5px;">
                    <span>ELEVEN ${translations[currentLang].piece} ${i}</span>
                    <div class="price-container">
                        <span class="old-price">699 EGP</span>
                        <span class="new-price">550 EGP</span>
                    </div>
                </div>
                <div class="viewer-count">${viewerText}</div>
                <div class="size-selector" id="size-group-${i}">
                    <button class="size-btn" onclick="event.stopPropagation(); selectSize(this, 'M', ${i})">M</button>
                    <button class="size-btn" onclick="event.stopPropagation(); selectSize(this, 'L', ${i})">L</button>
                    <button class="size-btn" onclick="event.stopPropagation(); selectSize(this, 'XL', ${i})">XL</button>
                </div>
                <button class="add-btn" onclick="event.stopPropagation(); addToBag(${i}, 'Piece #${i}', 550)">${translations[currentLang].addToBag}</button>
            `;
            grid.appendChild(card);
        }

        setTimeout(() => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.05 });
            document.querySelectorAll('.product-card').forEach(c => observer.observe(c));
        }, 50);

        function selectSize(btn, size, id) {
            const container = btn.parentElement;
            if (container) {
                container.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            }
            btn.classList.add('selected');
            selectedSizes[id] = size;
        }

        function addToBag(id, name, price) {
            const size = selectedSizes[id];
            if (!size) {
                alert(currentLang === 'en' ? 'Please select a size first!' : 'من فضلك اختر المقاس أولاً!');
                return;
            }
            const existing = cart.find(item => item.id === id && item.size === size);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, size, qty: 1 });
            }
            updateUI();
            openSidebar('cart');
        }

        function toggleWishlist(id, btn) {
            const index = wishlist.indexOf(id);
            if (index > -1) {
                wishlist.splice(index, 1);
                btn.classList.remove('active');
            } else {
                wishlist.push(id);
                btn.classList.add('active');
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('wishlist-count').innerText = wishlist.length;
        }

        function openSidebar(type) {
            activeSidebarType = type;
            const sidebar = document.getElementById('sidebar');
            const title = document.getElementById('sidebar-title');
            const itemsCont = document.getElementById('sidebar-items');
            const checkoutSec = document.getElementById('sidebar-checkout-section');
            
            title.innerText = translations[currentLang][type === 'cart' ? 'bagTitle' : 'wishTitle'];
            itemsCont.innerHTML = '';

            if (type === 'cart') {
                checkoutSec.style.display = 'block';
                if (cart.length === 0) itemsCont.innerHTML = `<p style="text-align:center; color:#888;">${translations[currentLang].empty}</p>`;
                cart.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'sidebar-item';
                    div.innerHTML = `
                        <img class="sidebar-item-img" src="images/${item.id}.png" onerror="handleImgError(this, ${item.id})">
                        <div style="flex:1;">
                            <h4 style="font-weight:900;">ELEVEN ${translations[currentLang].piece} ${item.id}</h4>
                            <p style="font-size:13px; color:#666;">Size: ${item.size} | Qty: ${item.qty}</p>
                            <p style="font-weight:800; color:var(--accent-color); margin-top:5px;">${item.price * item.qty} EGP</p>
                        </div>
                        <button onclick="cart.splice(${index},1); openSidebar('cart'); updateUI();" style="background:none; border:none; cursor:pointer; color:#888;">✕</button>
                    `;
                    itemsCont.appendChild(div);
                });
                const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
                document.getElementById('sidebar-total').innerText = `${total} EGP`;
                document.getElementById('total-text').innerText = translations[currentLang].total;
            } else {
                checkoutSec.style.display = 'none';
                if (wishlist.length === 0) itemsCont.innerHTML = `<p style="text-align:center; color:#888;">${translations[currentLang].empty}</p>`;
                wishlist.forEach((id, index) => {
                    const div = document.createElement('div');
                    div.className = 'sidebar-item';
                    div.innerHTML = `
                        <img class="sidebar-item-img" src="images/${id}.png" onerror="handleImgError(this, ${id})">
                        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                            <h4 style="font-weight:900;">ELEVEN ${translations[currentLang].piece} ${id}</h4>
                            <p style="font-weight:800; color:var(--accent-color);">550 EGP</p>
                        </div>
                        <button onclick="wishlist.splice(${index},1); openSidebar('wishlist'); updateUI();" style="background:none; border:none; cursor:pointer; color:#888;">✕</button>
                    `;
                    itemsCont.appendChild(div);
                });
            }
            sidebar.classList.add('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }

        function openQuickView(id) {
            const modal = document.getElementById('quickview-modal');
            const img = document.getElementById('modal-img');
            const title = document.getElementById('modal-title');
            const sizeGroup = document.getElementById('modal-size-group');
            const addBtn = document.getElementById('modal-add-btn');

            img.src = `images/${id}.png`;
            img.onerror = function() { handleImgError(img, id); };
            
            title.innerText = `ELEVEN ${translations[currentLang].piece} ${id}`;
            
            sizeGroup.innerHTML = `
                <button class="size-btn" onclick="selectSize(this, 'M', ${id})">M</button>
                <button class="size-btn" onclick="selectSize(this, 'L', ${id})">L</button>
                <button class="size-btn" onclick="selectSize(this, 'XL', ${id})">XL</button>
            `;
            
            if(selectedSizes[id]) {
                const checkedBtn = Array.from(sizeGroup.querySelectorAll('.size-btn')).find(b => b.innerText === selectedSizes[id]);
                if(checkedBtn) checkedBtn.classList.add('selected');
            }

            addBtn.innerText = translations[currentLang].addToBag;
            addBtn.onclick = function() { addToBag(id, `Piece #${id}`, 550); closeQuickView(); };

            modal.style.display = 'flex';
        }

        function closeQuickView() {
            document.getElementById('quickview-modal').style.display = 'none';
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.getElementById('lang-indicator').innerText = currentLang.toUpperCase();
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            if (currentLang === 'ar') document.body.classList.add('rtl-mode');
            else document.body.classList.remove('rtl-mode');
            
            document.querySelectorAll('.product-card').forEach(card => {
                const id = card.getAttribute('data-id');
                const randomViewers = Math.floor(Math.random() * 15) + 8;
                card.querySelector('.viewer-count').innerText = translations[currentLang].viewing.replace("{num}", randomViewers);
                card.querySelector('.add-btn').innerText = translations[currentLang].addToBag;
                card.querySelector('span').innerText = `ELEVEN ${translations[currentLang].piece} ${id}`;
            });
            updateUI();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            let text = `${translations[currentLang].ordered}\n\n`;
            cart.forEach(i => {
                text += `• ELEVEN Piece #${i.id} (Size: ${i.size}) x${i.qty} - ${i.price * i.qty} EGP\n`;
            });
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            text += `\n${translations[currentLang].total} ${total} EGP`;
            
            window.open(`https://wa.me/201287709113?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
