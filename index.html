<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleven Pop | Global Streetwear Brand</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&family=Cairo:wght@400;700&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --grey: #f4f4f4;
            --accent: #25d366; /* WhatsApp Green */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background-color: var(--white);
            color: var(--black);
            overflow-x: hidden;
        }

        /* 1. Custom Cursor */
        #cursor {
            width: 15px; height: 15px; background: var(--white);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; mix-blend-mode: difference; transition: transform 0.1s ease;
        }

        /* 2. Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black); display: flex; justify-content: center;
            align-items: center; z-index: 10000; transition: opacity 1s ease, visibility 1s;
        }
        #loader h1 { color: white; font-size: 3rem; letter-spacing: 15px; animation: pulse 1.5s infinite; }

        /* 3. Hero Section (YouTube) */
        .hero-bar {
            width: 100%; height: 100vh; position: relative;
            background: var(--black); display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .video-container iframe {
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            filter: brightness(0.4) grayscale(0.2);
        }
        .hero-content { position: relative; z-index: 2; text-align: center; color: var(--white); }
        .hero-title { font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; letter-spacing: 20px; text-transform: uppercase; }

        /* 4. Sales Notification */
        .sales-notification {
            position: fixed; bottom: 20px; left: -400px; background: white;
            color: black; padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999;
            display: flex; align-items: center; gap: 15px;
            transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1); border-left: 5px solid #000;
            direction: rtl;
        }
        .sales-notification.active { left: 20px; }
        .sales-info b { display: block; font-size: 0.9rem; }
        .sales-info p { font-size: 0.8rem; margin: 0; opacity: 0.7; }

        /* 5. Nav & Grid */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 5%; position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #eee;
        }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 5%; }
        
        /* استايل شريط البحث المضاف بما يتماشى مع الـ Minimal Black & White للموقع */
        .search-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 50px auto;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            border: 2px solid var(--black);
            background: transparent;
            color: var(--black);
            outline: none;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 50px; }
        .product-card { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .product-card.visible { opacity: 1; transform: translateY(0); }
        .product-img { width: 100%; height: 450px; overflow: hidden; background: var(--grey); margin-bottom: 20px; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .product-card:hover .product-img img { transform: scale(1.05); }

        /* استايل عداد المشاهدة الحية المضاف */
        .live-viewers {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
        }
        .live-viewers::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        /* Buttons & Cart */
        .size-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .size-btn { flex: 1; padding: 10px; border: 1px solid #ddd; background: none; font-weight: bold; }
        .size-btn.selected { background: black; color: white; border-color: black; }
        .add-btn { width: 100%; padding: 18px; background: var(--black); color: var(--white); border: none; font-weight: 900; text-transform: uppercase; }
        
        .cart-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%;
            background: var(--white); z-index: 2000; padding: 60px 40px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .cart-overlay.active { right: 0; }
        
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .remove-item-btn {
            color: #ff3b30; font-weight: bold; font-size: 1.1rem; border: none;
            background: none; padding: 5px 10px; transition: 0.2s;
        }
        .remove-item-btn:hover { opacity: 0.6; transform: scale(1.1); }

        /* Social Links Style */
        .social-links { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; }
        .social-links a {
            color: white; text-decoration: none; font-size: 0.8rem;
            letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; transition: 0.3s;
        }
        .social-links a:hover { opacity: 1; letter-spacing: 5px; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="loader"><h1>ELEVEN</h1></div>

    <!-- Sales Pop-up -->
    <div id="sales-pop" class="sales-notification">
        <div class="sales-info">
            <b id="buyer-name">أحمد من القاهرة</b>
            <p id="buyer-action">اشترى تيشيرت Eleven Piece #5</p>
            <p style="font-size: 0.6rem; opacity: 0.5;" id="buyer-time">منذ 2 دقيقة</p>
        </div>
    </div>

    <!-- Hero -->
    <header class="hero-bar">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/5i0vYvWcaGo?autoplay=1&mute=1&controls=0&loop=1&playlist=5i0vYvWcaGo&showinfo=0&rel=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">ELEVEN</h1>
            <p style="letter-spacing:10px;">GLOBAL STREETWEAR</p>
        </div>
    </header>

    <nav>
        <div style="font-weight:900; letter-spacing:4px;">ELEVEN POP</div>
        <div style="font-weight:900;" onclick="toggleCart()">BAG (<span id="cart-count">0</span>)</div>
    </nav>

    <section class="container">
        <!-- إضافة صندوق البحث الذكي المطلب هنا -->
        <div class="search-wrapper">
            <input type="text" id="product-search" class="search-input" placeholder="ابحث عن قطعة برقمها... (مثال: 12)" oninput="filterProducts()">
        </div>

        <div class="product-grid" id="product-grid"></div>
    </section>

    <!-- Footer & Social Media -->
    <footer style="background:#000; color:#fff; padding:100px 5%; text-align:center;">
        <h2 style="font-size:3rem; letter-spacing:10px; margin-bottom:30px;">ELEVEN</h2>
        
        <div class="social-links">
            <a href="https://www.instagram.com/eleven.pop" target="_blank">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@eleven.pop" target="_blank">TIKTOK</a>
        </div>

        <p style="opacity:0.3; font-size:0.7rem;">© 2026 ELEVEN LOCAL BRAND. ALL RIGHTS RESERVED.</p>
    </footer>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="letter-spacing: 5px;">YOUR BAG</h2>
            <span onclick="toggleCart()" style="font-size: 1.5rem; cursor:pointer;">✕</span>
        </div>
        <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="border-top: 2px solid black; padding-top: 20px;">
            <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.4rem; margin-bottom:20px;">
                <span>TOTAL</span>
                <span><span id="cart-total">0</span> EGP</span>
            </div>
            <button class="add-btn" style="background:#25d366;" onclick="checkoutWhatsApp()">ORDER VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        // 1. Cursor & Loader
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.visibility = 'hidden', 1000);
            }, 1000);
        });

        // 2. Sales Notifications Logic
        const names = ["محمد من دمياط", "سارة من المنصورة", "أحمد من القاهرة", "ياسين من الإسكندرية", "عمر من بورسعيد"];
        const prods = ["تيشيرت Eleven Graphic", "هودي الـ Oversized", "القطعة رقم #15", "التيشيرت الأسود الجديد"];
        
        function showPop() {
            const pop = document.getElementById('sales-pop');
            document.getElementById('buyer-name').innerText = names[Math.floor(Math.random()*names.length)];
            document.getElementById('buyer-action').innerText = "اشترى " + prods[Math.floor(Math.random()*prods.length)];
            pop.classList.add('active');
            setTimeout(() => pop.classList.remove('active'), 5000);
        }
        setInterval(showPop, 25000);

        // 3. Products Loop (من 9 لـ 49) مدمج به عداد الأشخاص الذكي والـ Fallback الآمن للصور
        const grid = document.getElementById('product-grid');
        let cart = [];
        let selections = {};

        for (let i = 9; i <= 49; i++) {
            // توليد رقم عشوائي لعدد الأشخاص الذين يشاهدون القطعة الآن
            const initialViewers = Math.floor(Math.random() * 19) + 4; 

            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-id', i); // معرف فرنسي لفلترة البحث بسهولة
            card.innerHTML = `
                <div class="product-img">
                    <img src="${i}.png" alt="Eleven Piece #${i}" onerror="this.src='https://placehold.co/500x700?text=ELEVEN+PIECE+${i}'">
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:5px;">
                    <span>ELEVEN PIECE #${i}</span>
                    <span>550 EGP</span>
                </div>
                <!-- ميزة عداد المشاهدين المضافة هنا بشكل متناسق -->
                <div class="live-viewers">يشاهد هذا المنتج الآن <span id="view-count-${i}">${initialViewers}</span> أشخاص</div>
                <div class="size-selector" id="size-group-${i}">
                    <button class="size-btn" onclick="selectSize(this, 'M', ${i})">M</button>
                    <button class="size-btn" onclick="selectSize(this, 'L', ${i})">L</button>
                    <button class="size-btn" onclick="selectSize(this, 'XL', ${i})">XL</button>
                </div>
                <button class="add-btn" onclick="addToBag(${i}, 'Piece #${i}', 550)">Add To Bag</button>
            `;
            grid.appendChild(card);
        }

        // دالة لتحديث عدادات المشاهدة عشوائيًا كل فترة لتبدو حية تماماً
        setInterval(() => {
            document.querySelectorAll('.live-viewers span').forEach(span => {
                let current = parseInt(span.innerText);
                let change = Math.random() > 0.5 ? 1 : -1;
                let next = current + change;
                if(next < 3) next = 3;
                if(next > 25) next = 25;
                span.innerText = next;
            });
        }, 4000);

        // ميزة شريط البحث الذكي (Filter Function) فلترة فورية بدون ريفريش
        function filterProducts() {
            const query = document.getElementById('product-search').value.trim();
            const cards = document.querySelectorAll('.product-card');
            
            cards.forEach(card => {
                const id = card.getAttribute('data-id');
                if (query === '' || id.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // مراقب التأثيرات الحركية عند عمل سكرول للأسفل
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.05 });
        
        setTimeout(() => {
            document.querySelectorAll('.product-card').forEach(c => observer.observe(c));
        }, 100);

        function selectSize(btn, size, id) {
            const group = document.getElementById(`size-group-${id}`);
            group.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selections[id] = size;
        }

        function toggleCart() { document.getElementById('cartOverlay').classList.toggle('active'); }

        function addToBag(id, name, price) {
            if (!selections[id]) { alert("اختر المقاس الأول يا بطل"); return; }
            cart.push({ id: Date.now(), name, price, size: selections[id] });
            updateCart();
            toggleCart();
        }

        function removeFromCart(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `
                <div class="cart-item">
                    <div>
                        <b>${item.name}</b><br>
                        <small>Size: ${item.size}</small>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${item.price} EGP</span>
                        <button class="remove-item-btn" onclick="removeFromCart(${item.id})">✕</button>
                    </div>
                </div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            let msg = "أوردر جديد من موقع Eleven:%0A%0A";
            cart.forEach(i => msg += `- ${i.name} (مقاس: ${i.size})%0A`);
            window.open(`https://wa.me/201062910161?text=${msg}%0Aإجمالي المبلغ: ${document.getElementById('cart-total').innerText} جنيه`);
        }
    </script>
</body>
</html>
